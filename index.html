
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Guardian — وزارة التعليم العالي والبحث العلمي</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Tahoma,sans-serif;background:#f5f5f0;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem}
  #app{width:100%;max-width:680px;background:#fff;border-radius:16px;border:1px solid rgba(0,0,0,0.1);overflow:hidden}
  .screen{display:none;padding:1.5rem}
  .screen.active{display:block}
  .btn{background:transparent;border:1px solid rgba(0,0,0,0.2);border-radius:8px;padding:9px 18px;font-size:14px;font-weight:500;cursor:pointer;color:#1a1a1a;transition:background 0.15s,transform 0.1s;font-family:inherit}
  .btn:hover{background:#f0f0eb}
  .btn:active{transform:scale(0.98)}
  .btn-purple{background:#AC833B;border-color:#AC833B;color:#fff}
  .btn-purple:hover{background:#8a6529;color:#fff}
  .btn-amber{background:#854F0B;border-color:#854F0B;color:#fff}
  .btn-amber:hover{background:#633806;color:#fff}
  .card{background:#fff;border:1px solid rgba(0,0,0,0.1);border-radius:12px;padding:1.25rem}
  .pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
  .xpbar-wrap{background:#f0f0eb;border-radius:8px;height:7px;overflow:hidden;margin:5px 0}
  .xpbar-fill{height:100%;border-radius:8px;background:#AC833B;transition:width 0.6s ease}
  .ans-btn{width:100%;text-align:left;padding:11px 15px;margin:5px 0;border:1px solid rgba(0,0,0,0.1);border-radius:8px;background:#fff;font-size:14px;cursor:pointer;color:#1a1a1a;transition:all 0.15s;font-family:inherit;line-height:1.5}
  .ans-btn:hover:not(:disabled){background:#f5f5f0;border-color:rgba(0,0,0,0.2)}
  .ans-btn.correct{background:#EAF3DE;border-color:#3B6D11;color:#173404}
  .ans-btn.wrong{background:#FCEBEB;border-color:#A32D2D;color:#501313}
  .ans-btn.reveal{background:#E6F1FB;border-color:#185FA5;color:#042C53}
  .sc-opt{border:1px solid rgba(0,0,0,0.1);border-radius:8px;padding:13px;margin:7px 0;cursor:pointer;transition:all 0.15s;background:#fff;font-size:14px;color:#1a1a1a;width:100%;text-align:left;font-family:inherit;line-height:1.5}
  .sc-opt:hover:not(.locked){background:#f5f5f0}
  .sc-opt.good{border-color:#3B6D11;background:#EAF3DE;color:#173404}
  .sc-opt.bad{border-color:#A32D2D;background:#FCEBEB;color:#501313}
  .sc-opt.locked{pointer-events:none;opacity:0.55}
  input[type=text]{width:100%;padding:9px 12px;border:1px solid rgba(0,0,0,0.2);border-radius:8px;font-size:14px;background:#fff;color:#1a1a1a;font-family:inherit}
  .lb-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(0,0,0,0.06)}
  .lb-row:last-child{border-bottom:none}
  .spin{display:inline-block;width:20px;height:20px;border:2px solid rgba(0,0,0,0.1);border-top-color:#AC833B;border-radius:50%;animation:spin 0.7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .rtl{direction:rtl;text-align:right}
  .rtl .ans-btn,.rtl .sc-opt{text-align:right}
  .lang-btn{padding:6px 14px;border:1px solid rgba(0,0,0,0.15);border-radius:8px;font-size:13px;cursor:pointer;background:transparent;color:#1a1a1a;font-family:inherit;font-weight:500;transition:all 0.15s}
  .lang-btn.active{background:#FDF5E6;border-color:#AC833B;color:#7a5a20}

  .mohesr-header{background:#fff;border-bottom:3px solid #AC833B;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .mohesr-logo-wrap{display:flex;align-items:center;gap:10px}
  .mohesr-ministry-name{font-size:11px;font-weight:600;color:#AC833B;line-height:1.35;max-width:180px}
  .mohesr-footer{background:#5E5E5E;padding:8px 20px;display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:auto}
  .mohesr-footer-text{font-size:10px;color:rgba(255,255,255,0.7)}
  .mohesr-color-bar{height:4px;display:flex}
  .mohesr-color-bar span{flex:1}
  @media(max-width:480px){body{padding:0}#app{border-radius:0;border:none;min-height:100vh}}
</style>
</head>

      {title:'\u0643\u0644\u0645\u0629 \u0627\u0644\u0645\u0631\u0648\u0631 \u0627\u0644\u0642\u0648\u064a\u0629',story:'\u064a\u062d\u062a\u0627\u062c \u0646\u0638\u0627\u0645\u0643 \u0625\u0644\u0649 \u0643\u0644\u0645\u0629 \u0645\u0631\u0648\u0631 \u0644\u0642\u0627\u0639\u062f\u0629 \u0628\u064a\u0627\u0646\u0627\u062a \u0633\u0631\u064a\u0629. \u064a\u0642\u062a\u0631\u062d \u0632\u0645\u064a\u0644\u0643 "Password2024" \u0644\u062a\u0633\u0647\u064a\u0644 \u0627\u0644\u062a\u0630\u0643\u0631.',opts:[
        {t:'\u0645\u0648\u0627\u0641\u0642 \u2014 \u0633\u0647\u0648\u0644\u0629 \u0627\u0644\u062a\u0630\u0643\u0631 \u062a\u0639\u0646\u064a \u062e\u0637\u0631 \u0623\u0642\u0644 \u0644\u0644\u0625\u063a\u0644\u0627\u0642.',good:false,fb:'\u0643\u0644\u0645\u0627\u062a \u0627\u0644\u0645\u0631\u0648\u0631 \u0627\u0644\u0645\u062a\u0648\u0642\u0639\u0629 \u0645\u0646 \u0623\u0628\u0631\u0632 \u0646\u0642\u0627\u0637 \u0627\u0644\u0636\u0639\u0641 \u0627\u0644\u0623\u0645\u0646\u064a\u0629.'},
        {t:'\u0627\u0633\u062a\u062e\u062f\u0645 \u0645\u062f\u064a\u0631 \u0643\u0644\u0645\u0627\u062a \u0645\u0631\u0648\u0631 \u0644\u062a\u0648\u0644\u064a\u062f \u0643\u0644\u0645\u0629 \u0645\u0631\u0648\u0631 \u0642\u0648\u064a\u0629 \u0648\u0641\u0631\u064a\u062f\u0629.',good:true,fb:'\u0645\u062f\u064a\u0631\u0648 \u0643\u0644\u0645\u0627\u062a \u0627\u0644\u0645\u0631\u0648\u0631 \u064a\u0648\u0644\u0651\u062f\u0648\u0646 \u0628\u064a\u0627\u0646\u0627\u062a \u0627\u0639\u062a\u0645\u0627\u062f \u0642\u0648\u064a\u0629 \u062f\u0648\u0646 \u0627\u0644\u062d\u0627\u062c\u0629 \u0644\u062d\u0641\u0638\u0647\u0627.'},
        {t:'\u0627\u0643\u062a\u0628 \u0643\u0644\u0645\u0629 \u0627\u0644\u0645\u0631\u0648\u0631 \u0639\u0644\u0649 \u0645\u0644\u0635\u0642 \u0628\u062c\u0627\u0646\u0628 \u0627\u0644\u062d\u0627\u0633\u0648\u0628.',good:false,fb:'\u0643\u0634\u0641 \u0628\u064a\u0627\u0646\u0627\u062a \u0627\u0644\u0627\u0639\u062a\u0645\u0627\u062f \u0627\u0644\u0645\u0627\u062f\u064a\u0629 \u062e\u0637\u0631 \u0623\u0645\u0646\u064a \u062c\u0633\u064a\u0645.'},
      ]},
      {title:'\u0637\u0644\u0628 \u0627\u0644\u0628\u064a\u0627\u0646\u0627\u062a \u0627\u0644\u0645\u0641\u062a\u0648\u062d\u0629',story:'\u064a\u0637\u0644\u0628 \u0623\u062d\u062f \u0627\u0644\u0645\u0648\u0627\u0637\u0646\u064a\u0646 \u0628\u064a\u0627\u0646\u0627\u062a \u0627\u0644\u0625\u0646\u0641\u0627\u0642 \u0627\u0644\u0639\u0627\u0645 \u0644\u0644\u0645\u062c\u0644\u0633. \u064a\u0642\u0648\u0644 \u0645\u062f\u064a\u0631\u0643 \u0623\u0631\u0633\u0644 PDF \u0644\u0623\u0646\u0647 "\u0623\u0635\u0639\u0628 \u0625\u0633\u0627\u0621\u0629 \u0627\u0633\u062a\u062e\u062f\u0627\u0645\u0647."',opts:[
        {t:'\u0623\u0631\u0633\u0644 PDF \u0641\u0642\u0637 \u2014 \u0627\u0644\u0645\u062f\u064a\u0631 \u0623\u062f\u0631\u0649.',good:false,fb:'PDF \u0644\u064a\u0633 \u0642\u0627\u0628\u0644\u0627\u064b \u0644\u0644\u0642\u0631\u0627\u0621\u0629 \u0627\u0644\u0622\u0644\u064a\u0629 \u0648\u064a\u064f\u062e\u0644 \u0628\u0645\u0628\u0627\u062f\u0626 \u0627\u0644\u0628\u064a\u0627\u0646\u0627\u062a \u0627\u0644\u0645\u0641\u062a\u0648\u062d\u0629.'},
        {t:'\u0627\u0646\u0634\u0631 CSV + PDF \u0645\u0639 \u062a\u0631\u062e\u064a\u0635 \u0645\u0641\u062a\u0648\u062d.',good:true,fb:'\u0643\u0644\u062a\u0627 \u0627\u0644\u0635\u064a\u063a\u062a\u064a\u0646 \u062a\u062e\u062f\u0645\u0627\u0646 \u0645\u0633\u062a\u062e\u062f\u0645\u064a\u0646 \u0645\u062e\u062a\u0644\u0641\u064a\u0646. \u0647\u0630\u0627 \u0647\u0648 \u0627\u0644\u0645\u0639\u064a\u0627\u0631 \u0627\u0644\u0630\u0647\u0628\u064a.'},
        {t:'\u0627\u0631\u0641\u0636 \u2014 \u0628\u064a\u0627\u0646\u0627\u062a \u0627\u0644\u0625\u0646\u0641\u0627\u0642 \u064a\u062c\u0628 \u0623\u0646 \u062a\u0628\u0642\u0649 \u062f\u0627\u062e\u0644\u064a\u0629.',good:false,fb:'\u0628\u064a\u0627\u0646\u0627\u062a \u0627\u0644\u0625\u0646\u0641\u0627\u0642 \u0627\u0644\u0639\u0627\u0645 \u0645\u0637\u0644\u0648\u0628 \u0642\u0627\u0646\u0648\u0646\u064a\u0627\u064b \u0623\u0646 \u062a\u0643\u0648\u0646 \u0645\u0641\u062a\u0648\u062d\u0629 \u0641\u064a \u0627\u0644\u063a\u0627\u0644\u0628.'},
      ]},
    ]
  },
  advanced:{
    en:[
      {title:'The third-party processor',story:"A new marketing SaaS tool's privacy policy states data \"may be shared with affiliates globally.\" Do you onboard it for customer data?",opts:[
        {t:"Proceed — it's GDPR-certified so it must be fine.",good:false,fb:"GDPR certification doesn't cover all obligations. Ensure a Data Processing Agreement is in place."},
        {t:'Conduct a DPIA and ensure a DPA is signed before onboarding.',good:true,fb:'A DPIA and signed DPA are mandatory before processing personal data with any third-party processor.'},
        {t:"Anonymise all data before sending — then no rules apply.",good:false,fb:"Partial anonymisation may not be sufficient. The DPIA still applies."},
      ]},
      {title:'The data breach',story:'At 4pm Friday you discover a misconfigured S3 bucket has exposed 10,000 customer records for 3 days. Your manager wants to investigate before reporting.',opts:[
        {t:'Wait for Monday to gather more evidence.',good:false,fb:'Under GDPR you have 72 hours from discovery to notify — waiting risks non-compliance.'},
        {t:'Notify the DPO and Data Protection Authority within 72 hours.',good:true,fb:'72-hour notification is mandatory. Document the breach, scope, and remediation immediately.'},
        {t:'Only notify if customers complain.',good:false,fb:'Notification obligations are triggered by the breach itself — waiting exposes the organisation to penalties.'},
      ]},
      {title:'Data retention conflict',story:'Legal holds a dataset "just in case." It contains personal data past its 7-year retention limit.',opts:[
        {t:"Keep it — Legal's hold overrides retention policy.",good:false,fb:"'Just in case' is not a lawful basis. Legal holds must be formally documented for specific litigation."},
        {t:'Work with Legal to assess whether a formal hold applies, and delete if not.',good:true,fb:'A valid legal hold requires documentation of specific litigation need. Absent that, policy prevails.'},
        {t:'Delete immediately — policy says 7 years.',good:false,fb:'Deleting during an active legal hold can constitute evidence destruction. Consult Legal first.'},
      ]},
    ],
    ar:[
      {title:'\u0627\u0644\u0645\u0639\u0627\u0644\u062c \u0627\u0644\u062e\u0627\u0631\u062c\u064a \u0644\u0644\u0628\u064a\u0627\u0646\u0627\u062a',story:'\u0623\u062f\u0627\u0629 \u062a\u0633\u0648\u064a\u0642\u064a\u0629 \u062c\u062f\u064a\u062f\u0629 (SaaS) \u062a\u0646\u0635 \u0633\u064a\u0627\u0633\u0629 \u062e\u0635\u0648\u0635\u064a\u062a\u0647\u0627 \u0639\u0644\u0649 \u0623\u0646 \u0627\u0644\u0628\u064a\u0627\u0646\u0627\u062a "\u0642\u062f \u062a\u064f\u0634\u0627\u0631\u064e\u0643 \u0645\u0639 \u0627\u0644\u0634\u0631\u0643\u0627\u062a \u0627\u0644\u062a\u0627\u0628\u0639\u0629 \u0639\u0627\u0644\u0645\u064a\u0627\u064b." \u0647\u0644 \u062a\u062a\u0639\u0627\u0645\u0644 \u0645\u0639\u0647\u0627 \u0644\u0628\u064a\u0627\u0646\u0627\u062a \u0627\u0644\u0639\u0645\u0644\u0627\u0621\u061f',opts:[
        {t:'\u062a\u0627\u0628\u0639 \u2014 \u0627\u0644\u0623\u062f\u0627\u0629 \u0645\u0639\u062a\u0645\u062f\u0629 GDPR \u0625\u0630\u0646 \u064a\u062c\u0628 \u0623\u0646 \u062a\u0643\u0648\u0646 \u0628\u062e\u064a\u0631.',good:false,fb:'\u0627\u0639\u062a\u0645\u0627\u062f GDPR \u0644\u0627 \u064a\u063a\u0637\u064a \u062c\u0645\u064a\u0639 \u0627\u0644\u0627\u0644\u062a\u0632\u0627\u0645\u0627\u062a. \u062a\u0623\u0643\u062f \u0645\u0646 \u0648\u062c\u0648\u062f \u0627\u062a\u0641\u0627\u0642\u064a\u0629 \u0645\u0639\u0627\u0644\u062c\u0629 \u0628\u064a\u0627\u0646\u0627\u062a.'},
        {t:'\u0623\u062c\u0631\u0650 \u062a\u0642\u064a\u064a\u0645 \u0623\u062b\u0631 \u062d\u0645\u0627\u064a\u0629 \u0627\u0644\u0628\u064a\u0627\u0646\u0627\u062a \u0648\u062a\u0623\u0643\u062f \u0645\u0646 \u062a\u0648\u0642\u064a\u0639 \u0627\u062a\u0641\u0627\u0642\u064a\u0629 \u0627\u0644\u0645\u0639\u0627\u0644\u062c\u0629 \u0642\u0628\u0644 \u0627\u0644\u0625\u0644\u062d\u0627\u0642.',good:true,fb:'\u062a\u0642\u064a\u064a\u0645 \u0623\u062b\u0631 \u062d\u0645\u0627\u064a\u0629 \u0627\u0644\u0628\u064a\u0627\u0646\u0627\u062a \u0648\u0627\u062a\u0641\u0627\u0642\u064a\u0629 \u0627\u0644\u0645\u0639\u0627\u0644\u062c\u0629 \u0627\u0644\u0645\u0648\u0642\u0651\u0639\u0629 \u0625\u0644\u0632\u0627\u0645\u064a\u0627\u0646 \u0642\u0628\u0644 \u0645\u0639\u0627\u0644\u062c\u0629 \u0627\u0644\u0628\u064a\u0627\u0646\u0627\u062a \u0645\u0639 \u0623\u064a \u0637\u0631\u0641 \u062b\u0627\u0644\u062b.'},
        {t:'\u0623\u062e\u0645\u0650\u0644 \u0647\u0648\u064a\u0629 \u062c\u0645\u064a\u0639 \u0627\u0644\u0628\u064a\u0627\u0646\u0627\u062a \u0642\u0628\u0644 \u0627\u0644\u0625\u0631\u0633\u0627\u0644.',good:false,fb:'\u0625\u062e\u0641\u0627\u0621 \u0627\u0644\u0647\u0648\u064a\u0629 \u0627\u0644\u062c\u0632\u0626\u064a \u0642\u062f \u0644\u0627 \u064a\u0643\u0641\u064a. \u062a\u0642\u064a\u064a\u0645 \u0623\u062b\u0631 \u062d\u0645\u0627\u064a\u0629 \u0627\u0644\u0628\u064a\u0627\u0646\u0627\u062a \u0644\u0627 \u064a\u0632\u0627\u0644 \u0645\u0637\u0644\u0648\u0628\u0627\u064b.'},
      ]},
      {title:'\u0627\u062e\u062a\u0631\u0627\u0642 \u0627\u0644\u0628\u064a\u0627\u0646\u0627\u062a',story:'\u0641\u064a \u0627\u0644\u0633\u0627\u0639\u0629 \u0627\u0644\u0631\u0627\u0628\u0639\u0629 \u0645\u0633\u0627\u0621\u064b \u064a\u0648\u0645 \u0627\u0644\u062c\u0645\u0639\u0629 \u0627\u0643\u062a\u0634\u0641\u062a \u0623\u0646 \u062d\u0627\u0648\u064a\u0629 S3 \u0643\u0634\u0641\u062a 10\u060c000 \u0633\u062c\u0644 \u0644\u0639\u0645\u0644\u0627\u0621 \u0644\u0645\u062f\u0629 3 \u0623\u064a\u0627\u0645. \u0645\u062f\u064a\u0631\u0643 \u064a\u0631\u064a\u062f \u0627\u0644\u062a\u062d\u0642\u064a\u0642 \u0642\u0628\u0644 \u0627\u0644\u0625\u0628\u0644\u0627\u063a.',opts:[
        {t:'\u0627\u0646\u062a\u0638\u0631 \u062d\u062a\u0649 \u0627\u0644\u0627\u062b\u0646\u064a\u0646 \u0644\u062c\u0645\u0639 \u0627\u0644\u0645\u0632\u064a\u062f \u0645\u0646 \u0627\u0644\u0623\u062f\u0644\u0629.',good:false,fb:'\u0628\u0645\u0648\u062c\u0628 \u0627\u0644\u0644\u0627\u0626\u062d\u0629 \u0627\u0644\u0623\u0648\u0631\u0648\u0628\u064a\u0629 \u0644\u062f\u064a\u0643 72 \u0633\u0627\u0639\u0629 \u0645\u0646 \u0627\u0644\u0627\u0643\u062a\u0634\u0627\u0641 \u0644\u0644\u0625\u062e\u0637\u0627\u0631.'},
        {t:'\u0623\u062e\u0637\u0631 \u0645\u0633\u0624\u0648\u0644 \u062d\u0645\u0627\u064a\u0629 \u0627\u0644\u0628\u064a\u0627\u0646\u0627\u062a \u0648\u0633\u0644\u0637\u0629 \u062d\u0645\u0627\u064a\u0629 \u0627\u0644\u0628\u064a\u0627\u0646\u0627\u062a \u062e\u0644\u0627\u0644 72 \u0633\u0627\u0639\u0629.',good:true,fb:'\u0627\u0644\u0625\u062e\u0637\u0627\u0631 \u062e\u0644\u0627\u0644 72 \u0633\u0627\u0639\u0629 \u0625\u0644\u0632\u0627\u0645\u064a. \u0648\u062b\u0651\u0642 \u0627\u0644\u0627\u062e\u062a\u0631\u0627\u0642 \u0648\u0646\u0637\u0627\u0642\u0647 \u0648\u062e\u0637\u0648\u0627\u062a \u0627\u0644\u0645\u0639\u0627\u0644\u062c\u0629 \u0641\u0648\u0631\u0627\u064b.'},
        {t:'\u0623\u0628\u0644\u063a \u0641\u0642\u0637 \u0625\u0630\u0627 \u0634\u0643\u0627 \u0627\u0644\u0639\u0645\u0644\u0627\u0621.',good:false,fb:'\u0627\u0644\u062a\u0632\u0627\u0645\u0627\u062a \u0627\u0644\u0625\u062e\u0637\u0627\u0631 \u062a\u0646\u0634\u0623 \u0645\u0646 \u0627\u0644\u0627\u062e\u062a\u0631\u0627\u0642 \u0630\u0627\u062a\u0647 \u2014 \u0627\u0644\u0627\u0646\u062a\u0638\u0627\u0631 \u064a\u0639\u0631\u0651\u0636 \u0627\u0644\u0645\u0624\u0633\u0633\u0629 \u0644\u0639\u0642\u0648\u0628\u0627\u062a \u0635\u0627\u0631\u0645\u0629.'},
      ]},

  let board=[...G.scores];if(myEntry)board.push(myEntry);board.sort((a,b)=>b.xp-a.xp);
  const medals=['&#129351;','&#129352;','&#129353;'];
  document.getElementById('s-leaderboard').innerHTML=`${langBar()}<div style="display:flex;align-items:center;gap:10px;margin-bottom:1.25rem"><button class="btn" onclick="go('s-home');renderHome()" style="padding:6px 12px;font-size:13px">${L.back}</button><div style="font-size:16px;font-weight:500;color:#1a1a1a">${L.leaderboard}</div></div>${!G.playerName?`<div class="card" style="margin-bottom:1rem"><div style="font-size:14px;font-weight:500;color:#1a1a1a;margin-bottom:8px">${L.joinBoard}</div><div style="display:flex;gap:8px"><input type="text" id="pname" placeholder="${L.yourName}" style="flex:1"><button class="btn btn-purple" onclick="joinBoard()">${L.join}</button></div></div>`:`<div style="font-size:13px;color:#666;margin-bottom:1rem">${L.playingAs} <strong style="color:#1a1a1a">${G.playerName}</strong></div>`}<div class="card">${board.map((p,i)=>`<div class="lb-row" style="${p.me?'background:#f5f5f0;border-radius:8px;padding:9px 8px;':''}"><div style="width:24px;text-align:center;font-size:15px">${i<3?medals[i]:`<span style="font-size:13px;color:#888">${i+1}</span>`}</div><div style="flex:1"><div style="font-size:14px;font-weight:${p.me?'600':'400'};color:#1a1a1a">${p.name}</div><div style="font-size:11px;color:#666">${L.level} ${p.level} &middot; ${p.badges} ${p.badges!==1?L.badges:L.badge}</div></div><div style="font-size:15px;font-weight:500;color:#AC833B">${p.xp} ${L.xp}</div></div>`).join('')}</div>`;
  rtl('s-leaderboard');go('s-leaderboard');
}
function joinBoard(){const n=document.getElementById('pname').value.trim();if(!n)return;G.playerName=n;showLeaderboard();}

renderHome();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Guardian — Data Governance Training Game</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem}
  #app{width:100%;max-width:680px;background:#fff;border-radius:16px;border:1px solid rgba(0,0,0,0.1);overflow:hidden;padding:0}
  .screen{display:none;padding:1.5rem}
  .screen.active{display:block}
  .btn{background:transparent;border:1px solid rgba(0,0,0,0.2);border-radius:8px;padding:9px 18px;font-size:14px;font-weight:500;cursor:pointer;color:#1a1a1a;transition:background 0.15s,transform 0.1s;font-family:inherit}
  .btn:hover{background:#f0f0eb}
  .btn:active{transform:scale(0.98)}
  .btn-purple{background:#534AB7;border-color:#534AB7;color:#fff}
  .btn-purple:hover{background:#3C3489;border-color:#3C3489;color:#fff}
  .btn-amber{background:#854F0B;border-color:#854F0B;color:#fff}
  .btn-amber:hover{background:#633806;color:#fff}
  .card{background:#fff;border:1px solid rgba(0,0,0,0.1);border-radius:12px;padding:1.25rem}
  .pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
  .xpbar-wrap{background:#f0f0eb;border-radius:8px;height:7px;overflow:hidden;margin:5px 0}
  .xpbar-fill{height:100%;border-radius:8px;background:#534AB7;transition:width 0.6s ease}
  .ans-btn{width:100%;text-align:left;padding:11px 15px;margin:5px 0;border:1px solid rgba(0,0,0,0.1);border-radius:8px;background:#fff;font-size:14px;cursor:pointer;color:#1a1a1a;transition:all 0.15s;font-family:inherit;line-height:1.4}
  .ans-btn:hover:not(:disabled){background:#f5f5f0;border-color:rgba(0,0,0,0.2)}
  .ans-btn.correct{background:#EAF3DE;border-color:#3B6D11;color:#173404}
  .ans-btn.wrong{background:#FCEBEB;border-color:#A32D2D;color:#501313}
  .ans-btn.reveal{background:#E6F1FB;border-color:#185FA5;color:#042C53}
  .sc-opt{border:1px solid rgba(0,0,0,0.1);border-radius:8px;padding:13px;margin:7px 0;cursor:pointer;transition:all 0.15s;background:#fff;font-size:14px;color:#1a1a1a;width:100%;text-align:left;font-family:inherit;line-height:1.5}
  .sc-opt:hover:not(.locked){background:#f5f5f0}
  .sc-opt.good{border-color:#3B6D11;background:#EAF3DE;color:#173404}
  .sc-opt.bad{border-color:#A32D2D;background:#FCEBEB;color:#501313}
  .sc-opt.locked{pointer-events:none;opacity:0.55}
  input[type=text]{width:100%;padding:9px 12px;border:1px solid rgba(0,0,0,0.2);border-radius:8px;font-size:14px;background:#fff;color:#1a1a1a;font-family:inherit}
  .lb-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(0,0,0,0.06)}
  .lb-row:last-child{border-bottom:none}
  .spin{display:inline-block;width:20px;height:20px;border:2px solid rgba(0,0,0,0.1);border-top-color:#534AB7;border-radius:50%;animation:spin 0.7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  @media(max-width:480px){body{padding:0}#app{border-radius:0;border:none;min-height:100vh}}
</style>
</head>
<body>
<div id="app">
  <div id="s-home" class="screen active"></div>
  <div id="s-diff" class="screen"></div>
  <div id="s-quiz" class="screen"></div>
  <div id="s-scenario" class="screen"></div>
  <div id="s-aigen" class="screen"></div>
  <div id="s-result" class="screen"></div>
  <div id="s-progress" class="screen"></div>
  <div id="s-leaderboard" class="screen"></div>
</div>

<script>
const G = {
  xp:0, level:1, badges:[], difficulty:'beginner',
  completed:{classify:false,opendata:false,scenario:false,aigen:false},
  playerName:'',
  scores:[
    {name:'Alex M.',xp:280,level:3,badges:3},
    {name:'Priya S.',xp:210,level:3,badges:2},
    {name:'Jordan T.',xp:190,level:2,badges:2},
    {name:'Sam R.',xp:120,level:2,badges:1},
    {name:'Casey L.',xp:80,level:1,badges:1},
  ]
};
const XPL = 100;

const QUESTIONS = {
  classify:{
    beginner:[
      {q:"A document shared on your company's public website is classified as:",opts:["Confidential","Internal","Public","Restricted"],c:2,exp:"Public data is freely accessible to everyone — no access restrictions needed."},
      {q:"Your HR payroll spreadsheet should be classified as:",opts:["Public","Internal","Open","Confidential"],c:3,exp:"Payroll data is sensitive personal/financial data — always Confidential."},
      {q:"A company-wide newsletter sent to all employees is:",opts:["Confidential","Internal","Public","Top Secret"],c:1,exp:"Internal data is for employees only — not outside the organisation."},
      {q:"A customer's home address in your CRM is:",opts:["Public","Internal","Confidential","Open"],c:2,exp:"Personal identifiable information (PII) like home addresses must be Confidential."},
      {q:"A press release about a product launch is:",opts:["Internal","Confidential","Public","Restricted"],c:2,exp:"Press releases are intentionally public — they are Public data."},
    ],
    advanced:[
      {q:"Under most data governance frameworks, which classification requires encryption both at rest AND in transit?",opts:["Public","Internal","Confidential","All data equally"],c:2,exp:"Confidential data must be encrypted both at rest and in transit per most frameworks including ISO 27001."},
      {q:"A pseudonymised dataset where re-identification is theoretically possible should be classified as:",opts:["Public","Open","Internal","Confidential"],c:3,exp:"Pseudonymised data retains re-identification risk — treat as Confidential until fully anonymised."},
      {q:"Your organisation's data retention schedule is published on the intranet. Its classification is:",opts:["Public","Internal","Confidential","Restricted"],c:1,exp:"Governance documents accessible to all staff are Internal — not Public as they contain operational details."},
      {q:"Aggregate sales figures with no individual-level data published in an annual report are:",opts:["Confidential","Internal","Public","Restricted"],c:2,exp:"Aggregated, anonymised data in a public report is Public — no individual data exposure risk."},
      {q:"A data subject access request (DSAR) response document is classified as:",opts:["Internal","Public","Confidential","Open"],c:2,exp:"DSARs contain the requester's personal data — strictly Confidential and only shared with the individual."},
    ]
  },
  opendata:{
    beginner:[
      {q:"Open data means data that is:",opts:["Free to view but not download","Freely usable, reusable and redistributable by anyone","Only shared between governments","Available for a fee"],c:1,exp:"Open data's 3 pillars: freely usable, reusable, and redistributable — no restrictions."},
      {q:"Which format best supports open data accessibility?",opts:["Locked PDF","Proprietary spreadsheet (.xls)","Open CSV file","Password-protected ZIP"],c:2,exp:"CSV is an open, non-proprietary, machine-readable format — ideal for open data."},
      {q:"An open dataset should ideally be updated:",opts:["Never — keep the original","Regularly to stay accurate and timely","Only when legally required","Once a year at most"],c:1,exp:"Timeliness is a core open data principle — data should be kept current to remain useful."},
      {q:"The best open data licence that allows unrestricted reuse is:",opts:["All Rights Reserved","CC BY (attribution)","CC NC (non-commercial)","CC0 / Public Domain"],c:3,exp:"CC0 waives all rights — zero restrictions on use, the most open licence possible."},
      {q:"'Machine-readable' open data means it can be:",opts:["Read only on specialised machines","Processed automatically by software","Viewed without a computer","Read only by data scientists"],c:1,exp:"Machine-readable means structured formats (CSV, JSON) that software can process without manual intervention."},
    ],
    advanced:[
      {q:"The Open Definition requires that open data licences must NOT restrict:",opts:["Commercial use","Attribution requirements","Format requirements","All of the above"],c:0,exp:"The Open Definition specifically prohibits restrictions on commercial use — licences like CC-NC are not considered truly open."},
      {q:"Which of the following violates the 'non-discrimination' principle of open data?",opts:["Requiring attribution","Charging for API access","Restricting use to non-profit organisations","Publishing in multiple formats"],c:2,exp:"Non-discrimination means any person or group can use the data — restricting to non-profits is discriminatory."},
      {q:"FAIR data principles stand for:",opts:["Free, Accessible, Interoperable, Reliable","Findable, Accessible, Interoperable, Reusable","Fast, Accurate, Indexed, Reliable","Findable, Authorised, Internal, Restricted"],c:1,exp:"FAIR = Findable, Accessible, Interoperable, Reusable — the research data management standard."},
      {q:"A government dataset published without a licence defaults to:",opts:["CC0 (public domain)","Full copyright — all rights reserved","Open Government Licence","Creative Commons BY"],c:1,exp:"Without an explicit licence, data is fully copyrighted — always publish with an explicit open licence."},
      {q:"Persistent URIs in open data publishing are important because they:",opts:["Speed up downloads","Allow data to be cited reliably over time","Encrypt the data automatically","Restrict access to verified users"],c:1,exp:"Persistent URIs ensure citations and links remain valid — critical for reproducibility and long-term data reuse."},
    ]
  }
};

const SCENARIOS = {
  beginner:[
    {title:'The forwarded email',story:'A colleague forwards you a spreadsheet of 500 customer emails "just for reference." You have no project requiring it. What do you do?',opts:[
      {t:'Keep it — it might be useful later.',good:false,fb:'Storing data without a valid purpose violates data minimisation principles. Delete it.'},
      {t:"Delete it and let the colleague know you don't need it.",good:true,fb:'Correct! Only retain data you have a lawful, specific purpose for.'},
      {t:'Save it to a shared drive so others can access it.',good:false,fb:'Sharing personal data without authorisation significantly increases breach risk.'},
    ]},
    {title:'The strong password',story:'Your system requires a password for a confidential database. A teammate suggests "Password2024" to keep it simple for the team.',opts:[
      {t:'Agree — easy to remember means less risk of lockout.',good:false,fb:'Predictable passwords are one of the top attack vectors. Always use strong, unique credentials.'},
      {t:'Use a password manager to generate and store a strong unique password.',good:true,fb:'Password managers generate strong credentials and eliminate the need to remember them.'},
      {t:'Write the password on a sticky note by the computer so no one forgets.',good:false,fb:'Physical credential exposure is a serious security risk — never write down passwords visibly.'},
    ]},
    {title:'Open data request',story:"A citizen asks for your council's public spending data. Your manager says to send a PDF so it's \"harder to misuse.\"",opts:[
      {t:'Send only the PDF — manager knows best.',good:false,fb:'PDF is not machine-readable and undermines open data principles.'},
      {t:'Publish CSV + PDF with an open licence.',good:true,fb:'Both formats serve different users. Machine-readable + human-readable is the gold standard.'},
      {t:'Refuse — spending data should stay internal.',good:false,fb:'Public spending data is typically legally required to be open. Refusal undermines accountability.'},
    ]},
  ],
  advanced:[
    {title:'The third-party processor',story:"A new marketing SaaS tool offers great features but their privacy policy states data \"may be shared with affiliates globally.\" You need to decide whether to onboard it for customer data processing.",opts:[
      {t:"Proceed — the tool is GDPR-certified so it must be fine.",good:false,fb:"GDPR certification doesn't cover all obligations. You must assess transfers to third countries and ensure a Data Processing Agreement is in place."},
      {t:'Conduct a Data Protection Impact Assessment and ensure a DPA is signed before onboarding.',good:true,fb:'A DPIA and signed DPA are mandatory before processing personal data with any third-party processor.'},
      {t:"Anonymise all data before sending — then no rules apply.",good:false,fb:"Partial anonymisation may not be sufficient. Verify true anonymisation standard, and the DPIA still applies during evaluation."},
    ]},
    {title:'The data breach',story:'At 4pm Friday you discover a misconfigured S3 bucket has exposed 10,000 customer records publicly for 3 days. Your manager wants to investigate fully before reporting.',opts:[
      {t:'Wait for Monday to gather more evidence first.',good:false,fb:'Under GDPR, you have 72 hours from discovery to notify the supervisory authority — waiting risks non-compliance.'},
      {t:'Notify the DPO and Data Protection Authority within 72 hours, document everything.',good:true,fb:'Correct — 72-hour notification is mandatory. Document the breach, scope, and remediation steps immediately.'},
      {t:'Only notify if customers complain.',good:false,fb:'Notification obligations are triggered by the breach itself, not by complaints — waiting exposes the organisation to severe penalties.'},
    ]},
    {title:'Data retention conflict',story:'Legal holds a dataset "just in case." It contains personal data that has passed its 7-year retention limit per your policy.',opts:[
      {t:"Keep it — Legal's hold overrides retention policy.",good:false,fb:"Legal holds are legitimate for specific litigation, but must be formally documented. Generic 'just in case' is not a lawful basis."},
      {t:'Work with Legal to assess whether a formal litigation hold applies, and delete if not.',good:true,fb:'Correct — a valid legal hold requires documentation of specific litigation need. Absent that, retention policy prevails.'},
      {t:'Delete immediately — policy says 7 years.',good:false,fb:'Deleting during an active legal hold can constitute evidence destruction. Always consult Legal before deleting disputed data.'},
    ]},
  ]
};

let curMod=null, curQ=0, curScore=0, answered=false;
let curScenIdx=0, scScore=0, scList=[];
let aiQs=[], aiIdx=0, aiScore=0;

function go(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function addXP(n){G.xp+=n;G.level=Math.floor(G.xp/XPL)+1;renderHome();}

function renderHome(){
  const xpL=G.xp%XPL;
  const mods=[
    {id:'classify',label:'Data classification',sub:'Sort data into public, internal & confidential',col:'#534AB7',bg:'#EEEDFE',xp:G.difficulty==='beginner'?50:80},
    {id:'opendata',label:'Open data principles',sub:'Accessibility, licences & machine-readability',col:'#0F6E56',bg:'#E1F5EE',xp:G.difficulty==='beginner'?50:80},
    {id:'scenario',label:'Real-world scenarios',sub:'Make the right call in workplace situations',col:'#854F0B',bg:'#FAEEDA',xp:G.difficulty==='beginner'?60:90},
    {id:'aigen',label:'AI challenge',sub:'Fresh questions generated by AI each time',col:'#185FA5',bg:'#E6F1FB',xp:50,ai:true},
  ];
  document.getElementById('s-home').innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem">
      <div>
        <div style="font-size:20px;font-weight:600;color:#1a1a1a">Data Guardian</div>
        <div style="font-size:13px;color:#666">Level ${G.level} · ${G.xp} XP · ${G.badges.length} badge${G.badges.length!==1?'s':''}</div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end">
        <button class="btn" style="padding:6px 10px;font-size:12px" onclick="showDiff()">
          <span class="pill" style="background:${G.difficulty==='beginner'?'#EAF3DE':'#FCEBEB'};color:${G.difficulty==='beginner'?'#27500A':'#791F1F'}">${G.difficulty==='beginner'?'Beginner':'Advanced'}</span>
        </button>
        <button class="btn" style="padding:6px 10px;font-size:12px" onclick="showProgress()">Progress</button>
        <button class="btn" style="padding:6px 10px;font-size:12px" onclick="showLeaderboard()">Board</button>
      </div>
    </div>
    <div class="xpbar-wrap" style="margin-bottom:4px"><div class="xpbar-fill" style="width:${xpL}%"></div></div>
    <div style="font-size:11px;color:#666;margin-bottom:1.25rem">Level ${G.level} — ${xpL}/${XPL} XP to next level</div>
    <div style="display:grid;gap:9px">
      ${mods.map(m=>`<div class="card" style="cursor:pointer;display:flex;align-items:center;gap:14px;padding:1rem" onclick="${m.ai?'startAIGen()':'startQuiz(\''+m.id+'\')'}">
        <div style="width:40px;height:40px;border-radius:8px;background:${m.bg};flex-shrink:0"></div>
        <div style="flex:1;min-width:0">
          <div style="font-size:14px;font-weight:500;color:#1a1a1a">${m.label}</div>
          <div style="font-size:12px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${m.sub}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
          ${G.completed[m.id]?'<span style="font-size:16px;color:#3B6D11">&#10003;</span>':''}
          <span class="pill" style="background:${m.bg};color:${m.col}">+${m.xp} XP</span>
        </div>
      </div>`).join('')}
    </div>
  `;
}

function showDiff(){
  document.getElementById('s-diff').innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:1.5rem">
      <button class="btn" onclick="go('s-home');renderHome()" style="padding:6px 12px;font-size:13px">&larr; Back</button>
      <div style="font-size:16px;font-weight:500;color:#1a1a1a">Choose difficulty</div>
    </div>
    <div style="display:grid;gap:12px">
      <div class="card" style="cursor:pointer;border:${G.difficulty==='beginner'?'2px solid #534AB7':'1px solid rgba(0,0,0,0.1)'}" onclick="setDiff('beginner')">
        <div style="font-size:15px;font-weight:500;color:#1a1a1a;margin-bottom:4px">Beginner</div>
        <div style="font-size:13px;color:#666;line-height:1.5">Core concepts — ideal for all employees. Covers everyday data handling, basic classification, and open data fundamentals.</div>
      </div>
      <div class="card" style="cursor:pointer;border:${G.difficulty==='advanced'?'2px solid #A32D2D':'1px solid rgba(0,0,0,0.1)'}" onclick="setDiff('advanced')">
        <div style="font-size:15px;font-weight:500;color:#1a1a1a;margin-bottom:4px">Advanced</div>
        <div style="font-size:13px;color:#666;line-height:1.5">Deep-dive concepts — GDPR obligations, DPIA, legal holds, FAIR data, and complex classification edge cases.</div>
      </div>
    </div>
  `;
  go('s-diff');
}

function setDiff(d){G.difficulty=d;renderHome();go('s-home');}

function startQuiz(mod){
  curMod=mod; curQ=0; curScore=0; answered=false;
  renderQ(); go('s-quiz');
}

function renderQ(){
  const qs=QUESTIONS[curMod][G.difficulty];
  const q=qs[curQ], total=qs.length;
  const colors={classify:['#534AB7','#EEEDFE'],opendata:['#0F6E56','#E1F5EE']};
  const [col,bg]=colors[curMod];
  document.getElementById('s-quiz').innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:1.25rem">
      <button class="btn" onclick="go('s-home');renderHome()" style="padding:6px 12px;font-size:13px">&larr; Back</button>
      <div style="flex:1">
        <div style="font-size:12px;color:#666">${curMod==='classify'?'Data classification':'Open data'} &middot; <span class="pill" style="background:${bg};color:${col}">${G.difficulty}</span></div>
        <div class="xpbar-wrap" style="margin:4px 0 0"><div class="xpbar-fill" style="width:${(curQ/total)*100}%;background:${col}"></div></div>
      </div>
      <span style="font-size:13px;color:#666">${curQ+1}/${total}</span>
    </div>
    <div class="card" style="margin-bottom:1rem">
      <div style="font-size:11px;font-weight:500;color:#666;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.05em">Question ${curQ+1}</div>
      <div style="font-size:15px;font-weight:500;color:#1a1a1a;line-height:1.55">${q.q}</div>
    </div>
    <div id="ans-wrap">${q.opts.map((o,i)=>`<button class="ans-btn" id="a${i}" onclick="pickAns(${i})">${String.fromCharCode(65+i)}. ${o}</button>`).join('')}</div>
    <div id="fb" style="display:none;margin-top:1rem"></div>
    <div id="nxt" style="margin-top:1rem;display:none"><button class="btn btn-purple" onclick="nextQ()" style="width:100%">${curQ+1<total?'Next &rarr;':'See results'}</button></div>
  `;
  answered=false;
}

function pickAns(idx){
  if(answered)return; answered=true;
  const qs=QUESTIONS[curMod][G.difficulty];
  const q=qs[curQ]; const ok=idx===q.c;
  document.querySelectorAll('.ans-btn').forEach((b,i)=>{
    b.disabled=true;
    if(i===q.c)b.classList.add('correct');
    else if(i===idx)b.classList.add('wrong');
    else b.classList.add('reveal');
  });
  if(ok){curScore++;addXP(10);}
  const fb=document.getElementById('fb');
  fb.style.display='block';
  fb.innerHTML=`<div style="background:${ok?'#EAF3DE':'#FCEBEB'};border:1px solid ${ok?'#3B6D11':'#A32D2D'};border-radius:8px;padding:12px 14px">
    <div style="font-size:14px;font-weight:500;color:${ok?'#173404':'#501313'};margin-bottom:3px">${ok?'Correct! +10 XP':'Not quite'}</div>
    <div style="font-size:13px;color:${ok?'#27500A':'#791F1F'};line-height:1.5">${q.exp}</div>
  </div>`;
  document.getElementById('nxt').style.display='block';
}

function nextQ(){
  const total=QUESTIONS[curMod][G.difficulty].length;
  if(curQ+1<total){curQ++;renderQ();}
  else showQuizResult();
}

function showQuizResult(){
  const total=QUESTIONS[curMod][G.difficulty].length;
  const pct=Math.round((curScore/total)*100);
  const bid=curMod+'_'+G.difficulty;
  const earned=pct>=60&&!G.badges.includes(bid);
  if(earned){G.badges.push(bid);addXP(20);}
  G.completed[curMod]=true;
  const labels={classify:'Data classification',opendata:'Open data'};
  showResult(pct,curScore,total,earned,labels[curMod],curMod,'startQuiz');
}

function showResult(pct,score,total,earned,label,mod,retryFn){
  document.getElementById('s-result').innerHTML=`
    <div style="text-align:center;padding:1rem 0">
      <div style="width:64px;height:64px;border-radius:50%;background:${pct>=60?'#EAF3DE':'#FCEBEB'};display:flex;align-items:center;justify-content:center;margin:0 auto 1rem">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="${pct>=60?'#3B6D11':'#A32D2D'}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">${pct>=60?'<polyline points="20 6 9 17 4 12"/>':'<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>'}</svg>
      </div>
      <div style="font-size:20px;font-weight:600;color:#1a1a1a;margin-bottom:6px">${pct>=80?'Excellent!':pct>=60?'Well done!':'Keep learning!'}</div>
      <div style="font-size:14px;color:#666;margin-bottom:1.5rem">${score} / ${total} correct (${pct}%)</div>
      ${earned?`<div style="background:#EEEDFE;border-radius:12px;padding:1rem;margin-bottom:1.25rem;display:inline-block">
        <div style="font-size:22px;margin-bottom:4px">&#127885;</div>
        <div style="font-size:14px;font-weight:500;color:#3C3489">${label} badge earned!</div>
        <div style="font-size:12px;color:#534AB7">+20 bonus XP</div>
      </div>`:''}
      <div style="display:flex;flex-direction:column;gap:8px">
        <button class="btn btn-purple" onclick="${retryFn}('${mod}')" style="width:100%">Try again</button>
        <button class="btn" onclick="go('s-home');renderHome()" style="width:100%">Back to missions</button>
      </div>
    </div>
  `;
  go('s-result');
}

function startScenarios(){
  scList=SCENARIOS[G.difficulty]; curScenIdx=0; scScore=0;
  renderScenario(); go('s-scenario');
}

function renderScenario(){
  const sc=scList[curScenIdx];
  document.getElementById('s-scenario').innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:1.25rem">
      <button class="btn" onclick="go('s-home');renderHome()" style="padding:6px 12px;font-size:13px">&larr; Back</button>
      <div style="flex:1">
        <div style="font-size:12px;color:#666">Scenarios &middot; <span class="pill" style="background:${G.difficulty==='beginner'?'#FAEEDA':'#FCEBEB'};color:${G.difficulty==='beginner'?'#633806':'#791F1F'}">${G.difficulty}</span></div>
        <div class="xpbar-wrap" style="margin:4px 0 0"><div class="xpbar-fill" style="width:${(curScenIdx/scList.length)*100}%;background:#854F0B"></div></div>
      </div>
      <span style="font-size:13px;color:#666">${curScenIdx+1}/${scList.length}</span>
    </div>
    <div class="card" style="margin-bottom:1rem">
      <span class="pill" style="background:#FAEEDA;color:#633806;margin-bottom:8px;display:inline-block">Scenario ${curScenIdx+1}</span>
      <div style="font-size:15px;font-weight:500;color:#1a1a1a;margin-bottom:8px">${sc.title}</div>
      <div style="font-size:14px;color:#555;line-height:1.6">${sc.story}</div>
    </div>
    <div id="sc-opts">${sc.opts.map((o,i)=>`<button class="sc-opt" id="sco${i}" onclick="pickScen(${i})">${o.t}</button>`).join('')}</div>
    <div id="sc-fb" style="display:none;margin-top:1rem"></div>
    <div id="sc-nxt" style="margin-top:1rem;display:none"><button class="btn btn-amber" onclick="nextScen()" style="width:100%">${curScenIdx+1<scList.length?'Next scenario &rarr;':'See results'}</button></div>
  `;
}

function pickScen(idx){
  const sc=scList[curScenIdx]; const o=sc.opts[idx];
  document.querySelectorAll('.sc-opt').forEach(b=>b.classList.add('locked'));
  document.getElementById('sco'+idx).classList.add(o.good?'good':'bad');
  if(o.good){scScore++;addXP(15);}
  const fb=document.getElementById('sc-fb');
  fb.style.display='block';
  fb.innerHTML=`<div style="background:${o.good?'#EAF3DE':'#FCEBEB'};border:1px solid ${o.good?'#3B6D11':'#A32D2D'};border-radius:8px;padding:12px 14px">
    <div style="font-size:14px;font-weight:500;color:${o.good?'#173404':'#501313'};margin-bottom:3px">${o.good?'Good call! +15 XP':'Think again...'}</div>
    <div style="font-size:13px;color:${o.good?'#27500A':'#791F1F'};line-height:1.5">${o.fb}</div>
  </div>`;
  document.getElementById('sc-nxt').style.display='block';
}

function nextScen(){
  if(curScenIdx+1<scList.length){curScenIdx++;renderScenario();}
  else{
    const pct=Math.round((scScore/scList.length)*100);
    const bid='scenario_'+G.difficulty;
    const earned=pct>=60&&!G.badges.includes(bid);
    if(earned){G.badges.push(bid);addXP(20);}
    G.completed.scenario=true;
    showResult(pct,scScore,scList.length,earned,'Scenario master','scenario','startScenarios');
  }
}

function startAIGen(){
  const topics=['data classification','open data principles','data handling best practices','GDPR basics','data minimisation','data breach response'];
  const topic=topics[Math.floor(Math.random()*topics.length)];
  aiQs=[]; aiIdx=0; aiScore=0;
  document.getElementById('s-aigen').innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:1.5rem">
      <button class="btn" onclick="go('s-home');renderHome()" style="padding:6px 12px;font-size:13px">&larr; Back</button>
      <div style="font-size:15px;font-weight:500;color:#1a1a1a">AI challenge</div>
    </div>
    <div style="text-align:center;padding:2.5rem 1rem">
      <div class="spin" style="margin:0 auto 1rem"></div>
      <div style="font-size:14px;color:#666">Generating ${G.difficulty} questions on<br><strong style="color:#1a1a1a">${topic}</strong>...</div>
    </div>
  `;
  go('s-aigen');
  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:1000,
      messages:[{role:'user',content:`Generate 4 multiple-choice quiz questions about "${topic}" for employees at ${G.difficulty} level. Return ONLY a JSON array, no markdown, no preamble. Each item: {"q":"question","opts":["A","B","C","D"],"c":0,"exp":"brief explanation"}. c is the 0-based index of the correct answer.`}]
    })
  })
  .then(r=>r.json())
  .then(d=>{
    const txt=d.content.map(x=>x.text||'').join('');
    const clean=txt.replace(/```json|```/g,'').trim();
    aiQs=JSON.parse(clean);
    renderAIQ();
  })
  .catch(()=>{
    document.getElementById('s-aigen').innerHTML=`
      <div style="padding:1.5rem">
        <button class="btn" onclick="go('s-home');renderHome()" style="padding:6px 12px;font-size:13px;margin-bottom:1.5rem">&larr; Back</button>
        <div class="card" style="text-align:center;padding:2rem">
          <div style="font-size:14px;color:#666;margin-bottom:1rem">Could not reach the AI engine right now. Check your connection and try again.</div>
          <button class="btn btn-purple" onclick="startAIGen()">Retry</button>
        </div>
      </div>
    `;
  });
}

function renderAIQ(){
  const q=aiQs[aiIdx], total=aiQs.length;
  document.getElementById('s-aigen').innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:1.25rem">
      <button class="btn" onclick="go('s-home');renderHome()" style="padding:6px 12px;font-size:13px">&larr; Back</button>
      <div style="flex:1">
        <div style="font-size:12px;color:#666">AI challenge &middot; <span class="pill" style="background:#E6F1FB;color:#0C447C">${G.difficulty}</span></div>
        <div class="xpbar-wrap" style="margin:4px 0 0"><div class="xpbar-fill" style="width:${(aiIdx/total)*100}%;background:#185FA5"></div></div>
      </div>
      <span style="font-size:13px;color:#666">${aiIdx+1}/${total}</span>
    </div>
    <div class="card" style="margin-bottom:1rem">
      <div style="font-size:11px;font-weight:500;color:#666;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.05em">AI generated &middot; Question ${aiIdx+1}</div>
      <div style="font-size:15px;font-weight:500;color:#1a1a1a;line-height:1.55">${q.q}</div>
    </div>
    <div id="ai-ans">${q.opts.map((o,i)=>`<button class="ans-btn" id="ai${i}" onclick="pickAI(${i})">${String.fromCharCode(65+i)}. ${o}</button>`).join('')}</div>
    <div id="ai-fb" style="display:none;margin-top:1rem"></div>
    <div id="ai-nxt" style="margin-top:1rem;display:none"><button class="btn btn-purple" onclick="nextAI()" style="width:100%">${aiIdx+1<total?'Next &rarr;':'See results'}</button></div>
  `;
  answered=false;
}

function pickAI(idx){
  if(answered)return; answered=true;
  const q=aiQs[aiIdx]; const ok=idx===q.c;
  document.querySelectorAll('.ans-btn').forEach((b,i)=>{
    b.disabled=true;
    if(i===q.c)b.classList.add('correct');
    else if(i===idx)b.classList.add('wrong');
    else b.classList.add('reveal');
  });
  if(ok){aiScore++;addXP(10);}
  const fb=document.getElementById('ai-fb');
  fb.style.display='block';
  fb.innerHTML=`<div style="background:${ok?'#EAF3DE':'#FCEBEB'};border:1px solid ${ok?'#3B6D11':'#A32D2D'};border-radius:8px;padding:12px 14px">
    <div style="font-size:14px;font-weight:500;color:${ok?'#173404':'#501313'};margin-bottom:3px">${ok?'Correct! +10 XP':'Not quite'}</div>
    <div style="font-size:13px;color:${ok?'#27500A':'#791F1F'};line-height:1.5">${q.exp}</div>
  </div>`;
  document.getElementById('ai-nxt').style.display='block';
}

function nextAI(){
  if(aiIdx+1<aiQs.length){aiIdx++;answered=false;renderAIQ();}
  else{
    const pct=Math.round((aiScore/aiQs.length)*100);
    const earned=pct>=60&&!G.badges.includes('aigen');
    if(earned){G.badges.push('aigen');addXP(20);}
    G.completed.aigen=true;
    showResult(pct,aiScore,aiQs.length,earned,'AI challenger','aigen','startAIGen');
  }
}

function showProgress(){
  const xpL=G.xp%XPL;
  const allDone=Object.values(G.completed).every(Boolean)&&G.badges.length>=4;
  const items=[
    {id:'classify',label:'Data classification',done:G.completed.classify},
    {id:'opendata',label:'Open data principles',done:G.completed.opendata},
    {id:'scenario',label:'Real-world scenarios',done:G.completed.scenario},
    {id:'aigen',label:'AI challenge',done:G.completed.aigen},
  ];
  document.getElementById('s-progress').innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:1.25rem">
      <button class="btn" onclick="go('s-home');renderHome()" style="padding:6px 12px;font-size:13px">&larr; Back</button>
      <div style="font-size:16px;font-weight:500;color:#1a1a1a">My progress</div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.25rem">
      <div style="background:#f5f5f0;border-radius:8px;padding:10px;text-align:center">
        <div style="font-size:22px;font-weight:600;color:#534AB7">${G.xp}</div>
        <div style="font-size:11px;color:#666">Total XP</div>
      </div>
      <div style="background:#f5f5f0;border-radius:8px;padding:10px;text-align:center">
        <div style="font-size:22px;font-weight:600;color:#3B6D11">${G.badges.length}</div>
        <div style="font-size:11px;color:#666">Badges</div>
      </div>
      <div style="background:#f5f5f0;border-radius:8px;padding:10px;text-align:center">
        <div style="font-size:22px;font-weight:600;color:#185FA5">${G.level}</div>
        <div style="font-size:11px;color:#666">Level</div>
      </div>
    </div>
    <div class="card" style="margin-bottom:1rem">
      <div style="font-size:12px;color:#666;margin-bottom:6px">Level ${G.level} — ${xpL}/${XPL} XP</div>
      <div class="xpbar-wrap"><div class="xpbar-fill" style="width:${xpL}%"></div></div>
    </div>
    <div class="card">
      ${items.map(it=>`<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(0,0,0,0.06)">
        <div style="width:28px;height:28px;border-radius:50%;background:${it.done?'#EAF3DE':'#f0f0eb'};display:flex;align-items:center;justify-content:center;font-size:13px;color:${it.done?'#3B6D11':'#888'}">${it.done?'&#10003;':'&#9675;'}</div>
        <div style="flex:1;font-size:14px;color:#1a1a1a">${it.label}</div>
        <span class="pill" style="background:${it.done?'#EAF3DE':'#f0f0eb'};color:${it.done?'#27500A':'#666'}">${it.done?'Done':'Pending'}</span>
      </div>`).join('')}
    </div>
    ${allDone?`<div style="background:#EEEDFE;border-radius:12px;padding:1.25rem;text-align:center;margin-top:1rem">
      <div style="font-size:20px;margin-bottom:6px">&#128737;</div>
      <div style="font-size:15px;font-weight:600;color:#3C3489">Data Guardian unlocked!</div>
      <div style="font-size:13px;color:#534AB7;margin-top:4px">All missions complete. You are a certified Data Guardian.</div>
    </div>`:''}
  `;
  go('s-progress');
}

function showLeaderboard(){
  const myEntry=G.playerName?{name:G.playerName+' (you)',xp:G.xp,level:G.level,badges:G.badges.length,me:true}:null;
  let board=[...G.scores];
  if(myEntry)board.push(myEntry);
  board.sort((a,b)=>b.xp-a.xp);
  const medals=['&#129351;','&#129352;','&#129353;'];
  document.getElementById('s-leaderboard').innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:1.25rem">
      <button class="btn" onclick="go('s-home');renderHome()" style="padding:6px 12px;font-size:13px">&larr; Back</button>
      <div style="font-size:16px;font-weight:500;color:#1a1a1a">Leaderboard</div>
    </div>
    ${!G.playerName?`<div class="card" style="margin-bottom:1rem">
      <div style="font-size:14px;font-weight:500;color:#1a1a1a;margin-bottom:8px">Join the board</div>
      <div style="display:flex;gap:8px"><input type="text" id="pname" placeholder="Your name" style="flex:1"><button class="btn btn-purple" onclick="joinBoard()">Join</button></div>
    </div>`:`<div style="font-size:13px;color:#666;margin-bottom:1rem">Playing as <strong style="color:#1a1a1a">${G.playerName}</strong></div>`}
    <div class="card">
      ${board.map((p,i)=>`<div class="lb-row" style="${p.me?'background:#f5f5f0;border-radius:8px;padding:9px 8px;':''}">
        <div style="width:24px;text-align:center;font-size:15px">${i<3?medals[i]:`<span style="font-size:13px;color:#888">${i+1}</span>`}</div>
        <div style="flex:1">
          <div style="font-size:14px;font-weight:${p.me?'600':'400'};color:#1a1a1a">${p.name}</div>
          <div style="font-size:11px;color:#666">Level ${p.level} &middot; ${p.badges} badge${p.badges!==1?'s':''}</div>
        </div>
        <div style="font-size:15px;font-weight:500;color:#534AB7">${p.xp} XP</div>
      </div>`).join('')}
    </div>
  `;
  go('s-leaderboard');
}

function joinBoard(){
  const n=document.getElementById('pname').value.trim();
  if(!n)return;
  G.playerName=n;
  showLeaderboard();
}

renderHome();
</script>
</body>
</html>
